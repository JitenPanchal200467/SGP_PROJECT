<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Browse and compare hostels to find your perfect accommodation.">
    <title>Hostel Selection — HostelHub</title>
    <link rel="stylesheet" href="css/index.css">
    <style>
        .page-header {
            padding: 120px 0 40px;
            text-align: center;
        }

        .page-header p {
            color: var(--text-secondary);
            margin-top: var(--space-sm);
        }

        .hostel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: var(--space-xl);
            padding-bottom: var(--space-3xl);
        }

        .hostel-card {
            padding: var(--space-xl);
        }

        .hostel-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: var(--space-md);
        }

        .hostel-emoji {
            font-size: 2.5rem;
            width: 60px;
            height: 60px;
            background: var(--bg-glass);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hostel-meta {
            display: flex;
            gap: var(--space-xs);
            flex-wrap: wrap;
        }

        .hostel-card h3 {
            margin-bottom: var(--space-sm);
            font-size: 1.25rem;
        }

        .hostel-desc {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: var(--space-lg);
            line-height: 1.5;
        }

        .hostel-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--space-sm);
            margin-bottom: var(--space-lg);
        }

        .stat {
            text-align: center;
            padding: var(--space-sm);
            background: var(--bg-glass);
            border-radius: var(--radius-sm);
        }

        .stat-label {
            display: block;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 2px;
        }

        .stat-value {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .hostel-facilities {
            display: flex;
            flex-wrap: wrap;
            gap: var(--space-xs);
            margin-bottom: var(--space-lg);
        }

        .facility-tag {
            padding: 0.2rem 0.6rem;
            background: var(--bg-glass);
            border: 1px solid var(--border);
            border-radius: var(--radius-full);
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .facility-tag.more {
            background: rgba(108, 99, 255, 0.1);
            color: var(--primary-light);
            border-color: rgba(108, 99, 255, 0.3);
        }

        .hostel-actions {
            display: flex;
            gap: var(--space-sm);
        }

        .hostel-actions .btn {
            flex: 1;
        }

        .compare-btn.active,
        .compare-btn[disabled] {
            opacity: 0.5;
        }

        /* Compare Bar */
        .compare-bar {
            position: fixed;
            bottom: -100px;
            left: 50%;
            transform: translateX(-50%);
            z-index: var(--z-sticky);
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: var(--space-md) var(--space-xl);
            box-shadow: var(--shadow-lg);
            transition: bottom var(--transition-base);
            max-width: 700px;
            width: 90%;
        }

        .compare-bar.visible {
            bottom: 24px;
        }

        .compare-bar-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: var(--space-md);
            flex-wrap: wrap;
            font-size: 0.9rem;
        }

        .compare-bar-actions {
            display: flex;
            gap: var(--space-sm);
        }

        @media (max-width: 768px) {
            .hostel-grid {
                grid-template-columns: 1fr;
            }

            .hostel-stats {
                grid-template-columns: repeat(3, 1fr);
            }

            .compare-bar-content {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>

<body>
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>

    <nav class="navbar" id="navbar">
        <div class="nav-content">
            <a href="index.html" class="nav-logo">
                <div class="logo-icon">🏠</div>
                <span>Hostel<span class="text-gradient">Hub</span></span>
            </a>
            <div class="nav-links" id="navLinks">
                <a href="index.html">Home</a>
                <a href="selection.html" class="active">Hostels</a>
                <a href="quick-access.html">Quick Access</a>
                <a href="login.html" class="btn btn-primary btn-sm">Sign In</a>
            </div>
            <div class="nav-toggle" id="navToggle" onclick="toggleNav()">
                <span></span><span></span><span></span>
            </div>
        </div>
    </nav>

    <div class="page-header">
        <div class="container">
            <h1>Find Your <span class="text-gradient">Hostel</span></h1>
            <p>Browse available hostels and add up to 3 for side-by-side comparison</p>
        </div>
    </div>

    <section class="section" style="padding-top: 0;">
        <div class="container">
            <div class="hostel-grid" id="hostelGrid">
                <!-- Rendered by selection.js -->
            </div>
        </div>
    </section>

    <div class="compare-bar" id="compareBar"></div>

    <footer class="footer">
        <div class="container">
            <p>© 2026 HostelHub. Crafted for smart campus living.</p>
        </div>
    </footer>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/main.js"></script>
    <script src="js/selection.js"></script>
</body>

</html>
