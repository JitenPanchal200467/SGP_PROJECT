<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏠</text></svg>">
    <meta name="description" content="Manage your HostelHub profile settings.">
    <title>My Profile — HostelHub</title>
    <link rel="stylesheet" href="css/index.css">
    <style>
        .profile-wrapper {
            max-width: 800px;
            margin: 0 auto;
            padding: 100px var(--space-lg) var(--space-3xl);
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: var(--space-xl);
            margin-bottom: var(--space-2xl);
            padding: var(--space-xl);
            background: var(--bg-glass);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
        }

        .profile-avatar-config {
            position: relative;
            flex-shrink: 0;
        }

        .avatar-preview {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: var(--gradient-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            object-fit: cover;
            border: 4px solid var(--bg-primary);
            box-shadow: var(--shadow-md);
        }

        .avatar-edit-btn {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--primary);
            color: #fff;
            border: 2px solid var(--bg-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1rem;
            transition: transform 0.2s;
        }

        .avatar-edit-btn:hover {
            transform: scale(1.1);
        }

        .profile-info h1 {
            font-size: 1.75rem;
            margin-bottom: 4px;
        }

        .profile-info p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .settings-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: var(--space-xl);
        }

        .settings-card {
            padding: var(--space-xl);
        }

        .settings-card h3 {
            margin-bottom: var(--space-lg);
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: var(--space-sm);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-md);
        }

        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
            }

            .profile-header {
                flex-direction: column;
                text-align: center;
            }
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: var(--space-sm);
            color: var(--text-secondary);
            margin-bottom: var(--space-xl);
            font-size: 0.95rem;
            transition: color var(--transition-fast);
        }

        .back-link:hover {
            color: var(--primary-light);
        }

        .save-bar {
            margin-top: var(--space-xl);
            display: flex;
            justify-content: flex-end;
            gap: var(--space-md);
        }
    </style>
</head>

<body>
    <div class="bg-orb bg-orb-1"></div>

    <nav class="navbar" id="navbar">
        <div class="nav-content">
            <a href="index.html" class="nav-logo">
                <div class="logo-icon">🏠</div>
                <span>Hostel<span class="text-gradient">Hub</span></span>
            </a>
            <div class="nav-links" id="navLinks">
                <a href="dashboard.html">Dashboard</a>
                <a href="selection.html">Hostels</a>
                <a href="profile.html" class="active">Profile</a>
                <button class="btn btn-secondary btn-sm" onclick="logout()">Logout</button>
            </div>
        </div>
    </nav>

    <div class="profile-wrapper">
        <a href="dashboard.html" class="back-link">← Back to Dashboard</a>
        <div class="profile-header reveal">
            <div class="profile-avatar-config">
                <div id="avatarPlaceholder" class="avatar-preview">👤</div>
                <img id="avatarImage" class="avatar-preview" style="display:none;">
                <label for="avatarUpload" class="avatar-edit-btn">📸</label>
                <input type="file" id="avatarUpload" style="display:none;" accept="image/*">
            </div>
            <div class="profile-info">
                <h1 id="headerName">Loading...</h1>
                <p id="headerEmail">...</p>
                <div class="badge badge-primary" style="margin-top: 8px;" id="headerRole">Student</div>
            </div>
        </div>

        <form id="profileForm" class="settings-grid">
            <!-- Personal Info -->
            <div class="card settings-card reveal">
                <h3>👤 Personal Information</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="profileName">Full Name</label>
                        <input type="text" id="profileName" class="form-input" required placeholder="John Doe">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="profilePhone">Phone Number</label>
                        <input type="tel" id="profilePhone" class="form-input" placeholder="+91 1234567890">
                    </div>
                </div>
                <div class="form-row" style="margin-top: var(--space-md);">
                    <div class="form-group">
                        <label class="form-label" for="profileCollege">College Name / ID</label>
                        <input type="text" id="profileCollege" class="form-input" placeholder="IIT Bombay / SID12345">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="profileRole">Role</label>
                        <select id="profileRole" class="form-input" disabled>
                            <option value="student">Student</option>
                            <option value="parent">Parent</option>
                        </select>
                        <p class="text-muted" style="font-size: 0.75rem; margin-top: 4px;">Role cannot be changed after
                            registration.</p>
                    </div>
                </div>
            </div>

            <!-- Profile Photo URL -->
            <div class="card settings-card reveal">
                <h3>🖼️ Profile Photo URL</h3>
                <p class="text-muted" style="font-size: 0.85rem; margin-bottom: var(--space-md);">
                    Paste a direct image URL or upload a photo using the icon above.
                </p>
                <div class="form-group">
                    <label class="form-label" for="profilePhotoUrl">Photo URL</label>
                    <input type="url" id="profilePhotoUrl" class="form-input"
                        placeholder="https://example.com/photo.jpg">
                </div>
            </div>

            <div class="save-bar">
                <button type="button" class="btn btn-outline" onclick="location.href='dashboard.html'">Cancel</button>
                <button type="submit" class="btn btn-primary" id="saveBtn">Save Changes</button>
            </div>
        </form>
    </div>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = getUser();
            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            // Populate form
            document.getElementById('profileName').value = user.name || '';
            document.getElementById('profilePhone').value = user.phone || '';
            document.getElementById('profileCollege').value = user.college_id || '';
            document.getElementById('profileRole').value = user.role || 'student';
            document.getElementById('profilePhotoUrl').value = user.avatar_url || '';

            // Update header
            document.getElementById('headerName').textContent = user.name;
            document.getElementById('headerEmail').textContent = user.email;
            document.getElementById('headerRole').textContent = user.role === 'parent' ? 'Parent' : 'Student';

            // Profile Photo handling
            function updateAvatar(url) {
                const img = document.getElementById('avatarImage');
                const placeholder = document.getElementById('avatarPlaceholder');
                if (url) {
                    img.src = url;
                    img.style.display = 'block';
                    placeholder.style.display = 'none';
                } else {
                    img.style.display = 'none';
                    placeholder.style.display = 'flex';
                }
            }
            updateAvatar(user.avatar_url);

            // Instant preview when URL changes
            document.getElementById('profilePhotoUrl').addEventListener('input', (e) => {
                updateAvatar(e.target.value);
            });

            // Form submission
            document.getElementById('profileForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const saveBtn = document.getElementById('saveBtn');
                saveBtn.disabled = true;
                saveBtn.textContent = 'Saving...';

                const updates = {
                    name: document.getElementById('profileName').value.trim(),
                    phone: document.getElementById('profilePhone').value.trim(),
                    college_id: document.getElementById('profileCollege').value.trim(),
                    avatar_url: document.getElementById('profilePhotoUrl').value.trim()
                };

                try {
                    const { error } = await _supabase
                        .from('users')
                        .update(updates)
                        .eq('id', user.id);

                    if (error) throw error;

                    // Update local storage
                    const updatedUser = { ...user, ...updates };
                    setUser(updatedUser);

                    // Update UI components
                    document.getElementById('headerName').textContent = updates.name;
                    updateAvatar(updates.avatar_url);

                    showToast('Profile updated successfully!', 'success');
                } catch (err) {
                    console.error('Update error:', err);
                    showToast('Failed to update profile.', 'error');
                } finally {
                    saveBtn.disabled = false;
                    saveBtn.textContent = 'Save Changes';
                }
            });
        });
    </script>
</body>

</html>
