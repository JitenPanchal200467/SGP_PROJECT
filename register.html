<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏠</text></svg>">
    <meta name="description" content="Create your HostelHub account.">
    <title>Join HostelHub — Student Registration</title>
    <link rel="stylesheet" href="css/index.css">
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px var(--space-lg) var(--space-3xl);
        }

        .auth-container {
            width: 100%;
            max-width: 520px;
        }

        .auth-header {
            text-align: center;
            margin-bottom: var(--space-2xl);
        }

        .auth-header .logo-icon {
            width: 56px;
            height: 56px;
            background: var(--gradient-primary);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin: 0 auto var(--space-lg);
            box-shadow: var(--shadow-glow);
        }

        .auth-header h1 {
            font-size: 1.75rem;
            margin-bottom: var(--space-xs);
        }

        .auth-header p {
            color: var(--text-secondary);
        }

        .auth-card {
            padding: var(--space-2xl);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-md);
        }

        .auth-divider {
            text-align: center;
            margin: var(--space-xl) 0;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .auth-link {
            text-align: center;
            font-size: 0.95rem;
            color: var(--text-secondary);
        }

        @media (max-width: 480px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>

    <nav class="navbar" id="navbar">
        <div class="nav-content">
            <a href="index.html" class="nav-logo">
                <div class="logo-icon">🏠</div>
                <span>Hostel<span class="text-gradient">Hub</span></span>
            </a>
            <div class="nav-links" id="navLinks">
                <a href="index.html">Home</a>
                <a href="selection.html">Hostels</a>
                <a href="login.html" class="btn btn-primary btn-sm">Sign In</a>
            </div>
            <div class="nav-toggle" id="navToggle" onclick="toggleNav()">
                <span></span><span></span><span></span>
            </div>
        </div>
    </nav>

    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-header">
                <div class="logo-icon">📝</div>
                <h1>Create Account</h1>
                <p>Join HostelHub and manage your hostel life effortlessly</p>
            </div>

            <div class="card auth-card">
                <form id="registerForm">
                    <div class="form-group">
                        <label class="form-label" for="regName">Full Name</label>
                        <input type="text" class="form-input" id="regName" placeholder="Enter your full name" required>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="regEmail">Email Address</label>
                            <input type="email" class="form-input" id="regEmail" placeholder="you@college.edu" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="regPhone">Phone Number</label>
                            <input type="tel" class="form-input" id="regPhone" placeholder="+91 98765 43210" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="regRole">I am a</label>
                            <select class="form-input" id="regRole">
                                <option value="student">🎓 Student</option>
                                <option value="parent">👨‍👩‍👧 Parent</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="regCollegeId">College / PRN ID</label>
                            <input type="text" class="form-input" id="regCollegeId" placeholder="e.g. STU2026001">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="regPassword">Password</label>
                            <input type="password" class="form-input" id="regPassword" placeholder="Min 6 characters"
                                required>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="regConfirm">Confirm Password</label>
                            <input type="password" class="form-input" id="regConfirm" placeholder="Re-enter password"
                                required>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg"
                        style="width: 100%; margin-top: var(--space-md);">Create Account →</button>
                </form>

                <div class="auth-divider">— or —</div>
                <p class="auth-link">Already have an account? <a href="login.html">Sign In →</a></p>
            </div>
        </div>
    </div>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <script src="js/config.js" type="module"></script>
    <script src="js/supabase.js" defer></script>
    <script src="js/main.js" defer></script>
    <script src="js/auth.js" defer></script>
</body>

</html>
