<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="HostelHub Notification Center — view all your alerts.">
    <title>Notifications — HostelHub</title>
    <link rel="stylesheet" href="css/index.css">
    <style>
        .page-wrapper {
            min-height: 100vh;
            padding: 100px var(--space-lg) var(--space-3xl);
            max-width: 800px;
            margin: 0 auto;
        }

        .page-title {
            margin-bottom: var(--space-sm);
        }

        .page-subtitle {
            color: var(--text-secondary);
            margin-bottom: var(--space-xl);
        }

        .filter-tabs {
            display: flex;
            gap: var(--space-xs);
            flex-wrap: wrap;
            margin-bottom: var(--space-xl);
            padding: 4px;
            background: var(--bg-glass);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
        }

        .filter-tab {
            padding: 0.5rem 1rem;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            border: none;
            background: none;
            transition: all var(--transition-fast);
        }

        .filter-tab.active {
            background: var(--primary);
            color: #fff;
        }

        .filter-tab:hover:not(.active) {
            color: var(--text-primary);
        }

        .notif-list {
            display: flex;
            flex-direction: column;
            gap: var(--space-sm);
        }

        .notif-item {
            display: flex;
            gap: var(--space-md);
            padding: var(--space-lg);
            border-radius: var(--radius-md);
            background: var(--bg-card);
            border: 1px solid var(--border);
            transition: all var(--transition-fast);
            cursor: pointer;
        }

        .notif-item:hover {
            border-color: var(--border-hover);
            background: var(--bg-glass-hover);
        }

        .notif-item.unread {
            border-left: 3px solid var(--primary);
            background: rgba(108, 99, 255, 0.04);
        }

        .notif-icon {
            font-size: 1.5rem;
            flex-shrink: 0;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-glass);
            border-radius: var(--radius-md);
        }

        .notif-content {
            flex: 1;
        }

        .notif-content h4 {
            font-size: 0.95rem;
            margin-bottom: 4px;
        }

        .notif-content p {
            font-size: 0.88rem;
            color: var(--text-secondary);
            margin-bottom: var(--space-sm);
        }

        .notif-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: var(--space-sm);
        }

        .notif-time {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .empty-state {
            text-align: center;
            padding: var(--space-3xl);
            color: var(--text-muted);
        }

        .empty-state .empty-icon {
            font-size: 3rem;
            margin-bottom: var(--space-lg);
            opacity: 0.5;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: var(--space-sm);
            color: var(--text-secondary);
            margin-bottom: var(--space-xl);
            font-size: 0.95rem;
        }

        .back-link:hover {
            color: var(--primary-light);
        }
    </style>
</head>

<body>
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>

    <nav class="navbar" id="navbar">
        <div class="nav-content">
            <a href="index.html" class="nav-logo">
                <div class="logo-icon">🏠</div>
                <span>Hostel<span class="text-gradient">Hub</span></span>
            </a>
            <div class="nav-links" id="navLinks">
                <a href="dashboard.html">Dashboard</a>
                <a href="notifications.html" class="active">Notifications</a>
                <a href="complaints.html">Complaints</a>
                <button class="btn btn-secondary btn-sm" onclick="logout()">Logout</button>
            </div>
            <div class="nav-toggle" id="navToggle" onclick="toggleNav()">
                <span></span><span></span><span></span>
            </div>
        </div>
    </nav>

    <div class="page-wrapper">
        <a href="dashboard.html" class="back-link">← Back to Dashboard</a>
        <h1 class="page-title">🔔 Notification Center</h1>
        <p class="page-subtitle">Stay updated with all your hostel alerts</p>

        <div class="filter-tabs" id="filterTabs">
            <button class="filter-tab active" data-filter="all">All</button>
            <button class="filter-tab" data-filter="attendance">📍 Attendance</button>
            <button class="filter-tab" data-filter="mess">🍽️ Mess</button>
            <button class="filter-tab" data-filter="maintenance">🛠️ Maintenance</button>
            <button class="filter-tab" data-filter="general">📢 General</button>
        </div>

        <div class="notif-list" id="notifList"></div>
    </div>

    <footer class="footer">
        <div class="container">
            <p>© 2026 HostelHub. Crafted for smart campus living.</p>
        </div>
    </footer>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/main.js"></script>
    <script>
        const notifications = [
            { id: 1, type: 'attendance', icon: '📍', title: 'Student Checked Out', desc: 'Your child checked out of campus at 3:45 PM today.', time: '15 min ago', unread: true },
            { id: 2, type: 'mess', icon: '🍽️', title: 'Today\'s Special: Gulab Jamun', desc: 'Don\'t miss today\'s special dessert at dinner.', time: '1 hour ago', unread: true },
            { id: 3, type: 'maintenance', icon: '🛠️', title: 'Complaint Updated', desc: 'Your plumbing complaint #1042 has been marked as "In Progress".', time: '2 hours ago', unread: true },
            { id: 4, type: 'attendance', icon: '📍', title: 'Student Checked In', desc: 'Your child checked back into campus at 11:00 AM.', time: '5 hours ago', unread: false },
            { id: 5, type: 'general', icon: '📢', title: 'Hostel Meeting Scheduled', desc: 'Weekly hostel council meeting this Saturday at 5 PM in the common room.', time: 'Yesterday', unread: false },
            { id: 6, type: 'mess', icon: '🍽️', title: 'Menu Change Notice', desc: 'Wednesday dinner has been updated: Veg Biryani replaced with Pulao due to ingredient availability.', time: '2 days ago', unread: false },
            { id: 7, type: 'maintenance', icon: '🛠️', title: 'Complaint Resolved', desc: 'Your Wi-Fi connectivity issue #1038 has been resolved.', time: '3 days ago', unread: false },
            { id: 8, type: 'general', icon: '📢', title: 'Water Supply Notice', desc: 'Water supply will be interrupted on Sunday 9 AM – 12 PM for tank cleaning.', time: '4 days ago', unread: false },
        ];

        let activeFilter = 'all';

        function renderNotifications() {
            const list = document.getElementById('notifList');
            const filtered = activeFilter === 'all' ? notifications : notifications.filter(n => n.type === activeFilter);

            if (filtered.length === 0) {
                list.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">🔔</div>
            <p>No notifications in this category</p>
          </div>`;
                return;
            }

            list.innerHTML = filtered.map(n => `
        <div class="notif-item ${n.unread ? 'unread' : ''}" onclick="markRead(${n.id})">
          <div class="notif-icon">${n.icon}</div>
          <div class="notif-content">
            <h4>${n.title}</h4>
            <p>${n.desc}</p>
            <div class="notif-meta">
              <span class="notif-time">🕐 ${n.time}</span>
              ${n.unread ? '<span class="badge badge-primary">New</span>' : ''}
            </div>
          </div>
        </div>
      `).join('');
        }

        function markRead(id) {
            const notif = notifications.find(n => n.id === id);
            if (notif) notif.unread = false;
            renderNotifications();
        }

        // Filter tabs
        document.getElementById('filterTabs').addEventListener('click', (e) => {
            const tab = e.target.closest('.filter-tab');
            if (!tab) return;
            document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            activeFilter = tab.dataset.filter;
            renderNotifications();
        });

        renderNotifications();
    </script>
</body>

</html>
