<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Submit and track complaints and service requests.">
    <title>Complaints — HostelHub</title>
    <link rel="stylesheet" href="css/index.css">
    <style>
        .page-wrapper {
            min-height: 100vh;
            padding: 100px var(--space-lg) var(--space-3xl);
            max-width: 900px;
            margin: 0 auto;
        }

        .page-title {
            margin-bottom: var(--space-sm);
        }

        .page-subtitle {
            color: var(--text-secondary);
            margin-bottom: var(--space-xl);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: var(--space-sm);
            color: var(--text-secondary);
            margin-bottom: var(--space-xl);
            font-size: 0.95rem;
        }

        .back-link:hover {
            color: var(--primary-light);
        }

        .complaints-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-xl);
        }

        /* Form */
        .complaint-form-card {
            padding: var(--space-xl);
        }

        .complaint-form-card h3 {
            margin-bottom: var(--space-lg);
            font-size: 1.1rem;
        }

        .priority-selector {
            display: flex;
            gap: var(--space-sm);
            margin-top: var(--space-xs);
        }

        .priority-option {
            flex: 1;
            text-align: center;
        }

        .priority-option input {
            display: none;
        }

        .priority-option label {
            display: block;
            padding: 0.5rem;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--bg-glass);
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all var(--transition-fast);
        }

        .priority-option input:checked+label.priority-low {
            border-color: var(--success);
            background: rgba(16, 185, 129, 0.12);
            color: var(--success);
        }

        .priority-option input:checked+label.priority-medium {
            border-color: var(--warning);
            background: rgba(245, 158, 11, 0.12);
            color: var(--warning);
        }

        .priority-option input:checked+label.priority-high {
            border-color: var(--danger);
            background: rgba(239, 68, 68, 0.12);
            color: var(--danger);
        }

        /* History */
        .history-card {
            padding: var(--space-xl);
        }

        .history-card h3 {
            margin-bottom: var(--space-lg);
            font-size: 1.1rem;
        }

        .complaint-list {
            display: flex;
            flex-direction: column;
            gap: var(--space-md);
        }

        .complaint-item {
            padding: var(--space-md);
            background: var(--bg-glass);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
        }

        .complaint-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--space-sm);
        }

        .complaint-item-header h4 {
            font-size: 0.95rem;
        }

        .complaint-item p {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: var(--space-sm);
        }

        .complaint-item-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        @media (max-width: 768px) {
            .complaints-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>

    <nav class="navbar" id="navbar">
        <div class="nav-content">
            <a href="index.html" class="nav-logo">
                <div class="logo-icon">🏠</div>
                <span>Hostel<span class="text-gradient">Hub</span></span>
            </a>
            <div class="nav-links" id="navLinks">
                <a href="dashboard.html">Dashboard</a>
                <a href="notifications.html">Notifications</a>
                <a href="complaints.html" class="active">Complaints</a>
                <button class="btn btn-secondary btn-sm" onclick="logout()">Logout</button>
            </div>
            <div class="nav-toggle" id="navToggle" onclick="toggleNav()">
                <span></span><span></span><span></span>
            </div>
        </div>
    </nav>

    <div class="page-wrapper">
        <a href="dashboard.html" class="back-link">← Back to Dashboard</a>
        <h1 class="page-title">🛠️ Complaints & Service Requests</h1>
        <p class="page-subtitle">Submit a new complaint or track existing ones</p>

        <div class="complaints-grid">
            <!-- New Complaint Form -->
            <div class="card complaint-form-card">
                <h3>📝 New Complaint</h3>
                <form id="complaintForm">
                    <div class="form-group">
                        <label class="form-label" for="compCategory">Category</label>
                        <select class="form-input" id="compCategory" required>
                            <option value="">Select a category</option>
                            <option value="plumbing">🚰 Plumbing</option>
                            <option value="electrical">💡 Electrical</option>
                            <option value="furniture">🪑 Furniture</option>
                            <option value="cleaning">🧹 Cleaning</option>
                            <option value="wifi">📶 Wi-Fi / Internet</option>
                            <option value="mess">🍽️ Mess / Food</option>
                            <option value="security">🔒 Security</option>
                            <option value="other">📋 Other</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="compSubject">Subject</label>
                        <input type="text" class="form-input" id="compSubject" placeholder="Brief title of your issue"
                            required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="compDesc">Description</label>
                        <textarea class="form-input" id="compDesc" placeholder="Describe the issue in detail..."
                            rows="4" required></textarea>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Priority</label>
                        <div class="priority-selector">
                            <div class="priority-option">
                                <input type="radio" name="priority" id="prLow" value="low" checked>
                                <label for="prLow" class="priority-low">🟢 Low</label>
                            </div>
                            <div class="priority-option">
                                <input type="radio" name="priority" id="prMed" value="medium">
                                <label for="prMed" class="priority-medium">🟡 Medium</label>
                            </div>
                            <div class="priority-option">
                                <input type="radio" name="priority" id="prHigh" value="high">
                                <label for="prHigh" class="priority-high">🔴 High</label>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%;">Submit Complaint</button>
                </form>
            </div>

            <!-- Complaint History -->
            <div class="card history-card">
                <h3>📋 Recent Complaints</h3>
                <div class="complaint-list" id="complaintList"></div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <p>© 2026 HostelHub. Crafted for smart campus living.</p>
        </div>
    </footer>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/main.js"></script>
    <script>
        // Default complaints
        const defaultComplaints = [
            { id: 1042, category: 'plumbing', subject: 'Bathroom tap leaking', desc: 'The tap in room A-204 bathroom has been dripping constantly for 2 days.', priority: 'medium', status: 'in-progress', date: '2026-02-16' },
            { id: 1038, category: 'wifi', subject: 'Wi-Fi connectivity issues', desc: 'Frequent disconnections in Block A since last week.', priority: 'high', status: 'resolved', date: '2026-02-12' },
            { id: 1035, category: 'furniture', subject: 'Broken chair', desc: 'Study chair arm rest is broken.', priority: 'low', status: 'open', date: '2026-02-10' },
        ];

        let complaints = JSON.parse(localStorage.getItem('hostelHub_complaints') || 'null') || defaultComplaints;

        function renderComplaints() {
            const list = document.getElementById('complaintList');
            if (complaints.length === 0) {
                list.innerHTML = '<p class="text-muted" style="text-align:center; padding:2rem;">No complaints yet</p>';
                return;
            }
            list.innerHTML = complaints.map(c => {
                const statusBadge = {
                    'open': '<span class="badge badge-warning">Open</span>',
                    'in-progress': '<span class="badge badge-info">In Progress</span>',
                    'resolved': '<span class="badge badge-success">Resolved</span>'
                };
                const catIcons = { plumbing: '🚰', electrical: '💡', furniture: '🪑', cleaning: '🧹', wifi: '📶', mess: '🍽️', security: '🔒', other: '📋' };
                return `
          <div class="complaint-item">
            <div class="complaint-item-header">
              <h4>${catIcons[c.category] || '📋'} ${c.subject}</h4>
              ${statusBadge[c.status]}
            </div>
            <p>${c.desc}</p>
            <div class="complaint-item-footer">
              <span>#${c.id} • ${c.date}</span>
              <span class="badge badge-${c.priority === 'high' ? 'danger' : c.priority === 'medium' ? 'warning' : 'success'}">${c.priority}</span>
            </div>
          </div>
        `;
            }).join('');
        }

        document.getElementById('complaintForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const category = document.getElementById('compCategory').value;
            const subject = document.getElementById('compSubject').value.trim();
            const desc = document.getElementById('compDesc').value.trim();
            const priority = document.querySelector('input[name="priority"]:checked').value;

            if (!category || !subject || !desc) {
                showToast('Please fill in all fields', 'error');
                return;
            }

            const complaint = {
                id: 1000 + complaints.length + Math.floor(Math.random() * 100),
                category, subject, desc, priority,
                status: 'open',
                date: new Date().toISOString().split('T')[0]
            };

            complaints.unshift(complaint);
            localStorage.setItem('hostelHub_complaints', JSON.stringify(complaints));
            renderComplaints();
            e.target.reset();
            showToast('Complaint #' + complaint.id + ' submitted successfully!', 'success');
        });

        renderComplaints();
    </script>
</body>

</html>
