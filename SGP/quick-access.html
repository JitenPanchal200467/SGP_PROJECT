<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Quick access to your hostel dashboard — skip the scan.">
    <title>Quick Access — HostelHub</title>
    <link rel="stylesheet" href="css/index.css">
    <style>
        .quick-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px var(--space-lg) var(--space-3xl);
        }

        .quick-container {
            max-width: 520px;
            width: 100%;
        }

        /* Returning User Card */
        .welcome-card {
            padding: var(--space-2xl);
            text-align: center;
        }

        .welcome-avatar {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: var(--gradient-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin: 0 auto var(--space-lg);
            box-shadow: var(--shadow-glow);
            animation: pulse 2s ease-in-out infinite;
        }

        .welcome-card h2 {
            margin-bottom: var(--space-sm);
        }

        .welcome-card p {
            color: var(--text-secondary);
            margin-bottom: var(--space-xl);
        }

        .hostel-preview {
            padding: var(--space-lg);
            background: var(--bg-glass);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            margin-bottom: var(--space-xl);
            display: flex;
            align-items: center;
            gap: var(--space-md);
        }

        .hostel-preview-icon {
            font-size: 2rem;
            width: 56px;
            height: 56px;
            background: var(--gradient-card);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .hostel-preview-info h4 {
            font-size: 1rem;
            margin-bottom: 4px;
        }

        .hostel-preview-info p {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin: 0;
        }

        .quick-actions {
            display: flex;
            flex-direction: column;
            gap: var(--space-sm);
        }

        .quick-actions .btn {
            width: 100%;
        }

        /* New User Fallback */
        .new-user-card {
            padding: var(--space-2xl);
            text-align: center;
        }

        .new-user-icon {
            font-size: 3rem;
            margin-bottom: var(--space-lg);
            opacity: 0.6;
        }

        .new-user-card h2 {
            margin-bottom: var(--space-sm);
        }

        .new-user-card p {
            color: var(--text-secondary);
            margin-bottom: var(--space-xl);
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        .scan-visual {
            width: 120px;
            height: 120px;
            margin: 0 auto var(--space-xl);
            border: 3px dashed var(--border);
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            animation: float 3s ease-in-out infinite;
        }
    </style>
</head>

<body>
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>

    <nav class="navbar" id="navbar">
        <div class="nav-content">
            <a href="index.html" class="nav-logo">
                <div class="logo-icon">🏠</div>
                <span>Hostel<span class="text-gradient">Hub</span></span>
            </a>
            <div class="nav-links" id="navLinks">
                <a href="index.html">Home</a>
                <a href="selection.html">Hostels</a>
                <a href="quick-access.html" class="active">Quick Access</a>
                <a href="login.html" class="btn btn-primary btn-sm">Sign In</a>
            </div>
            <div class="nav-toggle" id="navToggle" onclick="toggleNav()">
                <span></span><span></span><span></span>
            </div>
        </div>
    </nav>

    <div class="quick-page">
        <div class="quick-container">
            <!-- Content rendered by JS based on auth state -->
            <div id="quickContent"></div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <p>© 2026 HostelHub. Crafted for smart campus living.</p>
        </div>
    </footer>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = getUser();
            const container = document.getElementById('quickContent');

            if (user) {
                // Returning user — show quick dashboard access
                container.innerHTML = `
          <div class="card welcome-card animate-fade-in-up">
            <div class="welcome-avatar">👋</div>
            <h2>Welcome back, <span class="text-gradient">${user.name}</span>!</h2>
            <p>Skip the scan — jump straight to your hostel dashboard.</p>
            
            <div class="hostel-preview">
              <div class="hostel-preview-icon">🌅</div>
              <div class="hostel-preview-info">
                <h4>${user.hostel || 'Sunrise Hall'}</h4>
                <p>Room ${user.room || 'A-204'} • ${user.role === 'parent' ? 'Parent Account' : 'Student Account'}</p>
              </div>
            </div>

            <div class="quick-actions">
              <a href="dashboard.html" class="btn btn-primary btn-lg">📊 Go to Dashboard →</a>
              <a href="notifications.html" class="btn btn-secondary">🔔 View Notifications</a>
              <a href="complaints.html" class="btn btn-secondary">🛠️ File a Complaint</a>
              <button class="btn btn-outline" onclick="switchAccount()">🔄 Switch Account</button>
            </div>
          </div>
        `;
            } else {
                // New user — show QR scan prompt
                container.innerHTML = `
          <div class="card new-user-card animate-fade-in-up">
            <div class="scan-visual">📱</div>
            <h2>Scan to <span class="text-gradient">Get Started</span></h2>
            <p>Scan the QR code posted at your college hostel to discover and manage your accommodation instantly.</p>
            <div class="quick-actions">
              <a href="index.html" class="btn btn-primary btn-lg">🏠 Visit Homepage</a>
              <a href="selection.html" class="btn btn-secondary">🔍 Browse Hostels</a>
              <a href="login.html" class="btn btn-outline">🔐 Sign In</a>
            </div>
          </div>
        `;
            }
        });

        function switchAccount() {
            logout();
        }
    </script>
</body>

</html>
