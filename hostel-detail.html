<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏠</text></svg>">
    <meta name="description" content="View detailed information, amenities, and pricing for this hostel on HostelHub.">
    <meta property="og:title" content="Hostel Details — HostelHub">
    <meta property="og:description"
        content="Explore verified amenities, rooms, and mess details. Book your stay easily.">
    <title>Hostel Details — HostelHub</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/index.css">
    <style>
        /* ---- Layout ---- */
        .detail-wrap {
            max-width: 1100px;
            margin: 0 auto;
            padding: 100px var(--space-lg) var(--space-3xl);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: var(--space-xl);
            transition: color var(--transition-fast);
        }

        .back-link:hover {
            color: var(--primary);
        }

        /* ---- Gallery ---- */
        .gallery {
            display: grid;
            grid-template-columns: 2fr 1fr;
            grid-template-rows: 260px 180px;
            gap: 8px;
            border-radius: var(--radius-xl);
            overflow: hidden;
            margin-bottom: var(--space-2xl);
        }

        .gallery-main {
            grid-row: 1 / 3;
            position: relative;
        }

        .gallery img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            cursor: zoom-in;
            transition: transform 0.4s ease;
        }

        .gallery img:hover {
            transform: scale(1.02);
        }

        .gallery-thumb {
            position: relative;
            overflow: hidden;
        }

        .gallery-more-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
        }

        /* ---- Content Grid ---- */
        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: var(--space-2xl);
            align-items: start;
        }

        /* ---- Left pane ---- */
        .detail-main h1 {
            font-size: 2rem;
            letter-spacing: -0.03em;
            margin-bottom: var(--space-sm);
        }

        .detail-meta {
            display: flex;
            align-items: center;
            gap: var(--space-md);
            flex-wrap: wrap;
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: var(--space-xl);
        }

        .detail-meta .sep {
            color: var(--border-hover);
        }

        .rating-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: rgba(245, 158, 11, 0.15);
            color: var(--warning);
            border: 1px solid rgba(245, 158, 11, 0.25);
            border-radius: var(--radius-full);
            padding: 2px 10px;
            font-weight: 700;
            font-size: 0.82rem;
        }

        .gender-badge {
            background: rgba(99, 102, 241, 0.15);
            color: var(--primary-light);
            border: 1px solid rgba(99, 102, 241, 0.25);
            border-radius: var(--radius-full);
            padding: 2px 10px;
            font-size: 0.82rem;
            font-weight: 600;
        }

        /* ---- Sections ---- */
        .detail-section {
            padding: var(--space-xl) 0;
            border-top: 1px solid var(--border);
        }

        .detail-section h2 {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: var(--space-md);
        }

        .detail-section p {
            color: var(--text-secondary);
            line-height: 1.7;
            font-size: 0.95rem;
        }

        /* ---- Facilities ---- */
        .facilities-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: var(--space-sm);
        }

        .facility-chip {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px var(--space-md);
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-primary);
        }

        .facility-chip::before {
            content: '✓';
            color: var(--accent);
            font-weight: 800;
            font-size: 0.8rem;
        }

        /* ---- Right Booking Pane ---- */
        .booking-card {
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: var(--space-xl);
            position: sticky;
            top: 90px;
            box-shadow: var(--shadow-md);
        }

        .booking-price {
            margin-bottom: var(--space-lg);
        }

        .booking-price .price {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            color: var(--text-primary);
        }

        .booking-price .per {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-left: 4px;
        }

        .booking-info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.875rem;
        }

        .booking-info-row .label {
            color: var(--text-secondary);
        }

        .booking-info-row .value {
            font-weight: 600;
            color: var(--text-primary);
        }

        .booking-card .btn {
            width: 100%;
            margin-top: var(--space-md);
        }

        .warden-row {
            display: flex;
            align-items: center;
            gap: var(--space-md);
            padding: var(--space-lg);
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            margin-top: var(--space-lg);
        }

        .warden-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--gradient-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .warden-info .name {
            font-size: 0.9rem;
            font-weight: 600;
            margin: 0;
        }

        .warden-info .role {
            font-size: 0.78rem;
            color: var(--text-muted);
            margin: 0;
        }

        /* ---- Lightbox ---- */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: var(--z-modal);
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .lightbox.open {
            display: flex;
        }

        .lightbox img {
            max-width: 90vw;
            max-height: 80vh;
            object-fit: contain;
            border-radius: var(--radius-lg);
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 28px;
            color: #fff;
            font-size: 2rem;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .lightbox-close:hover {
            opacity: 1;
        }

        .lightbox-thumbs {
            display: flex;
            gap: 10px;
            margin-top: var(--space-lg);
        }

        .lightbox-thumbs img {
            width: 80px;
            height: 56px;
            object-fit: cover;
            border-radius: 6px;
            cursor: pointer;
            opacity: 0.55;
            transition: opacity 0.2s;
            border: 2px solid transparent;
        }

        .lightbox-thumbs img.active,
        .lightbox-thumbs img:hover {
            opacity: 1;
            border-color: #fff;
        }

        @media (max-width: 900px) {
            .detail-grid {
                grid-template-columns: 1fr;
            }

            .booking-card {
                position: static;
            }

            .gallery {
                grid-template-columns: 1fr;
                grid-template-rows: auto;
            }

            .gallery-main {
                grid-row: auto;
                height: 220px;
            }

            .gallery-thumb {
                height: 120px;
            }
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar" id="navbar">
        <div class="nav-content">
            <a href="index.html" class="nav-logo">
                <div class="logo-icon">🏠</div>
                <span>Hostel<span class="text-gradient">Hub</span></span>
            </a>
            <div class="nav-links" id="navLinks">
                <a href="index.html">Home</a>
                <a href="selection.html" class="active">Hostels</a>
                <a href="login.html" class="btn btn-primary btn-sm">Sign In</a>
            </div>
            <div class="nav-toggle" id="navToggle" onclick="toggleNav()">
                <span></span><span></span><span></span>
            </div>
        </div>
    </nav>

    <!-- Main Detail Wrap -->
    <div class="detail-wrap">
        <a href="selection.html" class="back-link">← Back to all hostels</a>

        <!-- Gallery -->
        <div class="gallery" id="gallery">
            <div class="gallery-main">
                <img id="mainImg" src="" alt="Hostel" onclick="openLightbox(0)">
            </div>
            <div class="gallery-thumb" id="thumb1">
                <img id="thumbImg1" src="" alt="" onclick="openLightbox(1)">
            </div>
            <div class="gallery-thumb" id="thumb2" style="position:relative; overflow:hidden;">
                <img id="thumbImg2" src="" alt="" onclick="openLightbox(2)">
                <div class="gallery-more-overlay" id="moreOverlay" onclick="openLightbox(2)">+2 more</div>
            </div>
        </div>

        <!-- Content -->
        <div class="detail-grid">

            <!-- Left -->
            <div class="detail-main">
                <h1 id="hostelName">Loading...</h1>
                <div class="detail-meta">
                    <span class="rating-badge" id="ratingBadge">⭐ 0.0</span>
                    <span class="sep">·</span>
                    <span id="distance">–</span>
                    <span class="sep">·</span>
                    <span id="sharingType">–</span>
                    <span class="gender-badge" id="gender">–</span>
                </div>

                <div class="detail-section">
                    <h2>About this hostel</h2>
                    <p id="description">–</p>
                </div>

                <div class="detail-section">
                    <h2>Facilities & Amenities</h2>
                    <div class="facilities-grid" id="facilitiesGrid"></div>
                </div>

                <div class="detail-section">
                    <h2>Availability</h2>
                    <p id="availability">–</p>
                </div>
            </div>

            <!-- Right Booking Card -->
            <div>
                <div class="booking-card">
                    <div class="booking-price">
                        <span class="price" id="price">₹0</span>
                        <span class="per">/ month</span>
                    </div>

                    <div class="booking-info-row">
                        <span class="label">Available rooms</span>
                        <span class="value" id="availRooms">–</span>
                    </div>
                    <div class="booking-info-row">
                        <span class="label">Distance from campus</span>
                        <span class="value" id="distCard">–</span>
                    </div>
                    <div class="booking-info-row">
                        <span class="label">Sharing type</span>
                        <span class="value" id="sharingCard">–</span>
                    </div>

                    <button class="btn btn-primary" id="bookBtn">Book Now</button>
                    <button class="btn btn-outline" onclick="history.back()">Compare Others</button>

                    <div class="warden-row">
                        <div class="warden-avatar">👨‍💼</div>
                        <div class="warden-info">
                            <p class="name" id="wardenName">–</p>
                            <p class="role">Hostel Warden</p>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <span class="lightbox-close" onclick="closeLightbox()">×</span>
        <img id="lightboxImg" src="" alt="">
        <div class="lightbox-thumbs" id="lightboxThumbs"></div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>© 2026 HostelHub. Making student life simpler.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/main.js"></script>
    <script src="js/selection.js"></script>
    <script>
        let currentHostel = null;
        let galleryImages = [];

        async function loadDetail() {
            const user = getUser();

            // Try sessionStorage first (from click on card)
            const stored = sessionStorage.getItem('viewHostel');
            if (stored) {
                currentHostel = JSON.parse(stored);
                renderHostelDetail(currentHostel);
            } else {
                // Fallback: use URL param ?id=
                const id = parseInt(new URLSearchParams(location.search).get('id'));
                if (id && window.demoHostels) {
                    currentHostel = demoHostels.find(h => h.id === id);
                    if (currentHostel) { renderHostelDetail(currentHostel); }
                    else { window.location.href = 'selection.html'; return; }
                } else {
                    window.location.href = 'selection.html';
                    return;
                }
            }

            // Check if already assigned a hostel
            if (user && user.hostel_id) {
                const bookBtn = document.getElementById('bookBtn');
                bookBtn.disabled = true;
                bookBtn.textContent = 'Already Assigned';
                bookBtn.classList.remove('btn-primary');
                bookBtn.classList.add('btn-secondary');
            }
        }

        function renderHostelDetail(h) {
            document.title = `${h.name} — HostelHub`;
            galleryImages = h.images || [];

            // Gallery
            document.getElementById('mainImg').src = galleryImages[0] || '';
            document.getElementById('thumbImg1').src = galleryImages[1] || galleryImages[0] || '';
            document.getElementById('thumbImg2').src = galleryImages[2] || galleryImages[0] || '';

            if (galleryImages.length <= 3) {
                document.getElementById('moreOverlay').style.display = 'none';
            } else {
                document.getElementById('moreOverlay').textContent = `+${galleryImages.length - 3} more`;
            }

            // Details
            document.getElementById('hostelName').textContent = h.name;
            document.getElementById('ratingBadge').textContent = `⭐ ${h.rating}`;
            document.getElementById('distance').textContent = `${h.distance} from campus`;
            document.getElementById('sharingType').textContent = h.sharing_type || '2-Sharing';
            document.getElementById('gender').textContent = h.gender || 'Co-ed';
            document.getElementById('description').textContent = h.description;
            document.getElementById('availability').textContent = `${h.available_rooms} out of ${h.total_rooms} rooms currently available.`;

            // Booking card
            document.getElementById('price').textContent = `₹${h.price.toLocaleString()}`;
            document.getElementById('availRooms').textContent = `${h.available_rooms} rooms`;
            document.getElementById('distCard').textContent = h.distance;
            document.getElementById('sharingCard').textContent = h.sharing_type || '2-Sharing';
            document.getElementById('wardenName').textContent = h.warden || 'N/A';

            document.getElementById('bookBtn').onclick = async () => {
                const user = getUser();

                // Always store in session for fallback/auth-flow
                sessionStorage.setItem('selectedHostel', JSON.stringify(h));

                if (!user) {
                    showToast('Please login to complete booking', 'info');
                    setTimeout(() => window.location.href = 'login.html', 800);
                    return;
                }

                try {
                    const btn = document.getElementById('bookBtn');
                    btn.disabled = true;
                    btn.textContent = 'Booking...';

                    // Update user profile in Supabase using the DB wrapper
                    await DB.update('users', user.id, {
                        hostel_id: h.id > 1000 ? null : h.id,
                        room_number: 'A-' + (100 + Math.floor(Math.random() * 900))
                    });

                    // Update local user object
                    const updatedUser = { ...user, hostel: h.name, room: 'A-' + (100 + Math.floor(Math.random() * 900)) };
                    setUser(updatedUser);

                    showToast('Booking successful!', 'success');
                    setTimeout(() => window.location.href = 'dashboard.html', 1000);
                } catch (err) {
                    console.error('Booking failed:', err);
                    if (!err.message) showToast('Booking failed. Please try again.', 'error');
                    const btn = document.getElementById('bookBtn');
                    btn.disabled = false;
                    btn.textContent = 'Book Now';
                }
            };

            // Facilities
            const grid = document.getElementById('facilitiesGrid');
            grid.innerHTML = (h.facilities || []).map(f => `<div class="facility-chip">${f}</div>`).join('');

            // Lightbox thumbs
            const thumbsEl = document.getElementById('lightboxThumbs');
            thumbsEl.innerHTML = galleryImages.map((img, i) =>
                `<img src="${img}" class="${i === 0 ? 'active' : ''}" onclick="showLightboxImg(${i})">`
            ).join('');
        }

        // ---- Lightbox ----
        let lbIndex = 0;

        function openLightbox(idx) {
            lbIndex = idx;
            document.getElementById('lightbox').classList.add('open');
            showLightboxImg(idx);
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('open');
        }

        function showLightboxImg(idx) {
            lbIndex = idx;
            document.getElementById('lightboxImg').src = galleryImages[idx] || '';
            document.querySelectorAll('.lightbox-thumbs img').forEach((img, i) => {
                img.classList.toggle('active', i === idx);
            });
        }

        document.getElementById('lightbox').addEventListener('click', (e) => {
            if (e.target === document.getElementById('lightbox')) closeLightbox();
        });

        document.addEventListener('keydown', (e) => {
            const lb = document.getElementById('lightbox');
            if (!lb.classList.contains('open')) return;
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowRight') showLightboxImg((lbIndex + 1) % galleryImages.length);
            if (e.key === 'ArrowLeft') showLightboxImg((lbIndex - 1 + galleryImages.length) % galleryImages.length);
        });

        document.addEventListener('DOMContentLoaded', loadDetail);
    </script>
</body>

</html>
