<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏠</text></svg>">
    <meta name="description" content="Compare selected hostels side by side.">
    <title>Compare Hostels — HostelHub</title>
    <link rel="stylesheet" href="css/index.css">
    <style>
        .page-header {
            padding: 120px 0 40px;
            text-align: center;
        }

        .page-header p {
            color: var(--text-secondary);
            margin-top: var(--space-sm);
        }

        .comparison-grid {
            display: grid;
            gap: 1px;
            background: var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            margin-bottom: var(--space-3xl);
        }

        .comparison-grid>div {
            padding: var(--space-lg);
            background: var(--bg-secondary);
        }

        .comp-header {
            text-align: center;
            padding: var(--space-xl);
            background: var(--bg-card);
        }

        .comp-emoji {
            font-size: 2.5rem;
            margin-bottom: var(--space-sm);
        }

        .comp-label {
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.02);
        }

        .comp-value {
            font-size: 0.95rem;
            display: flex;
            align-items: center;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: var(--space-sm);
            color: var(--text-secondary);
            margin-bottom: var(--space-lg);
            font-size: 0.95rem;
        }

        .back-link:hover {
            color: var(--primary-light);
        }

        @media (max-width: 768px) {
            .comparison-grid {
                font-size: 0.85rem;
            }

            .comparison-grid>div {
                padding: var(--space-md);
            }
        }
    </style>
</head>

<body>
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>

    <nav class="navbar" id="navbar">
        <div class="nav-content">
            <a href="index.html" class="nav-logo">
                <div class="logo-icon">🏠</div>
                <span>Hostel<span class="text-gradient">Hub</span></span>
            </a>
            <div class="nav-links" id="navLinks">
                <a href="index.html">Home</a>
                <a href="selection.html">Hostels</a>
                <a href="login.html" class="btn btn-primary btn-sm">Sign In</a>
            </div>
            <div class="nav-toggle" id="navToggle" onclick="toggleNav()">
                <span></span><span></span><span></span>
            </div>
        </div>
    </nav>

    <div class="page-header">
        <div class="container">
            <h1>Hostel <span class="text-gradient">Comparison</span></h1>
            <p>Side-by-side analysis to help you make the right choice</p>
        </div>
    </div>

    <section class="section" style="padding-top: 0;">
        <div class="container">
            <a href="selection.html" class="back-link">← Back to Hostel Selection</a>
            <div id="comparisonTable">
                <!-- Rendered by selection.js -->
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <p>© 2026 HostelHub. Crafted for smart campus living.</p>
        </div>
    </footer>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/main.js"></script>
    <script src="js/selection.js"></script>
</body>

</html>
