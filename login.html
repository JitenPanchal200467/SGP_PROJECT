<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏠</text></svg>">
    <meta name="description" content="Sign in to your HostelHub account.">
    <title>Sign In — HostelHub</title>
    <link rel="stylesheet" href="css/index.css">
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px var(--space-lg) var(--space-3xl);
        }

        .auth-container {
            width: 100%;
            max-width: 460px;
        }

        .auth-header {
            text-align: center;
            margin-bottom: var(--space-2xl);
        }

        .auth-header .logo-icon {
            width: 56px;
            height: 56px;
            background: var(--gradient-primary);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin: 0 auto var(--space-lg);
            box-shadow: var(--shadow-glow);
        }

        .auth-header h1 {
            font-size: 1.75rem;
            margin-bottom: var(--space-xs);
        }

        .auth-header p {
            color: var(--text-secondary);
        }

        .auth-card {
            padding: var(--space-2xl);
        }

        .role-selector {
            display: flex;
            gap: var(--space-sm);
            margin-bottom: var(--space-xl);
        }

        .role-option {
            flex: 1;
            text-align: center;
        }

        .role-option input {
            display: none;
        }

        .role-option label {
            display: block;
            padding: 0.75rem;
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            background: var(--bg-glass);
            cursor: pointer;
            transition: all var(--transition-fast);
            font-weight: 500;
            font-size: 0.9rem;
        }

        .role-option input:checked+label {
            border-color: var(--primary);
            background: var(--primary-glow);
            color: var(--primary-light);
            box-shadow: 0 0 15px var(--primary-glow);
        }

        .form-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--space-lg);
            font-size: 0.9rem;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            color: var(--text-secondary);
            cursor: pointer;
        }

        .checkbox-label input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--primary);
        }

        .auth-divider {
            text-align: center;
            margin: var(--space-xl) 0;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .auth-link {
            text-align: center;
            font-size: 0.95rem;
            color: var(--text-secondary);
        }
    </style>
</head>

<body>
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>

    <nav class="navbar" id="navbar">
        <div class="nav-content">
            <a href="index.html" class="nav-logo">
                <div class="logo-icon">🏠</div>
                <span>Hostel<span class="text-gradient">Hub</span></span>
            </a>
            <div class="nav-links" id="navLinks">
                <a href="index.html">Home</a>
                <a href="selection.html">Hostels</a>
                <a href="login.html" class="active btn btn-primary btn-sm">Sign In</a>
            </div>
            <div class="nav-toggle" id="navToggle" onclick="toggleNav()">
                <span></span><span></span><span></span>
            </div>
        </div>
    </nav>

    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-header">
                <div class="logo-icon">🔐</div>
                <h1>Welcome Back</h1>
                <p>Sign in to access your hostel dashboard</p>
            </div>

            <div class="card auth-card">
                <form id="loginForm">
                    <div class="role-selector">
                        <div class="role-option">
                            <input type="radio" name="loginRole" id="roleStudent" value="student" checked>
                            <label for="roleStudent">🎓 Student</label>
                        </div>
                        <div class="role-option">
                            <input type="radio" name="loginRole" id="roleParent" value="parent">
                            <label for="roleParent">👨‍👩‍👧 Parent</label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="loginEmail">Email Address</label>
                        <input type="email" class="form-input" id="loginEmail" placeholder="you@college.edu" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="loginPassword">Password</label>
                        <input type="password" class="form-input" id="loginPassword" placeholder="Enter your password"
                            required>
                    </div>

                    <div class="form-footer">
                        <label class="checkbox-label">
                            <input type="checkbox"> Remember me
                        </label>
                        <a href="#" style="color: var(--primary-light); font-size: 0.9rem;">Forgot password?</a>
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;">Sign In →</button>
                </form>

                <div class="auth-divider">— or —</div>
                <p class="auth-link">Don't have an account? <a href="register.html">Create one →</a></p>
            </div>
        </div>
    </div>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <script src="js/config.js" type="module"></script>
    <script src="js/supabase.js" defer></script>
    <script src="js/main.js" defer></script>
    <script src="js/auth.js" defer></script>
</body>

</html>
